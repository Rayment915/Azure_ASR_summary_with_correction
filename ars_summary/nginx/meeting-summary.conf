# Public HTTP endpoint: http://YOUR_DOMAIN:4321
# HTTP exposes credentials and uploaded meeting data in transit.
# Use only on a trusted network, VPN, or temporary test environment.
# Nginx loads the Dify application key from /etc/nginx/meeting-summary-dify-key.conf.
# Dify API is published by Docker only to the VM loopback interface on port 2222.
server {
    listen 4321;
    server_name YOUR_DOMAIN;

    # Basic Auth protects access but is NOT encrypted over HTTP.
    auth_basic "Meeting Summary";
    auth_basic_user_file /etc/nginx/.htpasswd-meeting-summary;

    root /var/www/meeting-summary;
    index index.html;
    client_max_body_size 320m;
    access_log /var/log/nginx/meeting-summary-access.log combined;
    error_log /var/log/nginx/meeting-summary-error.log warn;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    # index.html currently contains its application JavaScript inline.
    # Without 'unsafe-inline', the browser blocks the click handler and no POST is sent.
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'none'; frame-ancestors 'none'" always;

    # Private Docker service, exposed only through this authenticated same-origin path.
    location /markitdown/ {
        proxy_pass http://127.0.0.1:3333/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 190s;
        proxy_send_timeout 190s;
    }

    # Browser sends no Dify key. Nginx adds it before forwarding to Dify's private VM loopback port.
    location = /dify-api/v1/workflows/run {
        proxy_pass http://127.0.0.1:2222/v1/workflows/run;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        include /etc/nginx/meeting-summary-dify-key.conf;
        proxy_set_header Content-Type "application/json";
        proxy_read_timeout 650s;
        proxy_send_timeout 650s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
