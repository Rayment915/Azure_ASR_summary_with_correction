app:
  description: 将 Azure Speech 多说话人转写、可选会议材料和用户要求整理为可审阅的长会议纪要。
  icon: "\U0001F4DD"
  icon_background: "#D1F4E0"
  mode: workflow
  name: 长会议纪要（Azure Speech JSON）
  use_icon_as_answer_icon: false
kind: app
version: 0.1.5
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      enabled: false
    opening_statement: ''
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
  graph:
    edges:
    - id: start-normalize
      source: start
      sourceHandle: source
      target: normalize
      targetHandle: target
      type: custom
      zIndex: 0
      data:
        isInIteration: false
        isInLoop: false
        sourceType: start
        targetType: code
    - id: split-iterate
      source: split-transcript
      sourceHandle: source
      target: chunk-iteration
      targetHandle: target
