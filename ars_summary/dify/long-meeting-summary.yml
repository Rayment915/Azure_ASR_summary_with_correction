    - id: chunk-iteration-start
      type: custom-iteration-start
      position:
        x: 24
        y: 68
      positionAbsolute:
        x: 1894
        y: 328
      width: 44
      height: 48
      data:
        type: iteration-start
        title: ''
        desc: ''
        selected: false
        isInIteration: true
      parentId: chunk-iteration
      draggable: false
      selectable: false
      zIndex: 1002
      selected: false
      sourcePosition: right
      targetPosition: left
    - id: chunk-llm
      type: custom
      position:
        x: 128
        y: 68
      positionAbsolute:
        x: 1998
        y: 328
      width: 244
      height: 154
      data:
        type: llm
        title: 分块事实抽取
        desc: ''
        context:
          enabled: false
          variable_selector: []
        model:
          provider: azure_openai
          name: gpt-5.4
          mode: chat
          completion_params:
            temperature: 0.1
            max_tokens: 4000
        prompt_template:
        - role: system
          text: |
            你是严谨的会议分析器。给定一个连续转写片段，先在心中根据术语词表校正明显的 ASR 专名误识别；仅在材料明确支持时校正，无法确认则保留原词并标记“待确认”。
            只抽取原文明确表达的内容，不把建议、假设、个人意见或追问当成已决定事项。输出 Markdown，使用以下固定小节：
            ## 讨论主题
            ## 已确认结论与证据时间
            ## 方案、观点与争议
            ## 行动项（任务｜负责人｜截止时间｜证据时间；未明确则写待定）
            ## 风险与待确认
            ## 专名纠错记录（原词→标准词｜材料依据；仅列实际纠错）
            每项简洁、可与其他块去重。若某类无信息，写“无”。
        - role: user
          text: |
            纪要模板：{{#start.meeting_template#}}
            用户补充要求：{{#start.user_context#}}
            术语与事实词表：
            {{#terminology.text#}}

            当前逐字稿片段：
            {{#chunk-iteration.item#}}
        vision:
          enabled: false
        selected: false
        isInIteration: true
        isInLoop: false
        iteration_id: chunk-iteration
        variables: []
      parentId: chunk-iteration
      zIndex: 1002
      selected: false
      sourcePosition: right
      targetPosition: left
    viewport:
